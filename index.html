<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fritura Andromeda - Punto de Venta</title>
    <style>
        /* CSS para el estilo oscuro y bordes blancos del boceto */
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        /* Contenedor principal en malla (grid) */
        .grid-container {
            display: grid;
            grid-template-columns: 2fr 1fr; /* Columna izquierda más ancha */
            grid-template-rows: auto 1fr auto; /* Filas: Admin/Título, Ventas/Productos, Total/Exportar */
            gap: 10px;
            flex-grow: 1;
        }

        /* Estilo general para los paneles con borde blanco */
        .panel {
            border: 2px solid white;
            padding: 15px;
            box-sizing: border-box;
        }

        /* Panel de Administración (Inputs Superiores) */
        .admin-panel {
            grid-column: 1 / -1; /* Ocupa todo el ancho superior */
            display: flex;
            gap: 10px;
            align-items: center;
            background-color: #111;
        }

        .admin-panel input {
            background-color: #222;
            border: 1px solid white;
            color: white;
            padding: 8px;
            flex-grow: 1;
        }

        .admin-panel button {
            background-color: white;
            color: black;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Panel de Ventas (Izquierda, innerHTML) */
        .ventas-panel {
            grid-row: 2;
            grid-column: 1;
            overflow-y: auto; /* Scroll si hay muchas ventas */
        }

        .ventas-panel h2 {
            text-align: center;
            margin-top: 0;
        }

        #cuadro-ventas {
            font-family: monospace;
            font-size: 0.9em;
        }

        /* Panel de Selección de Productos (Derecha) */
        .productos-panel {
            grid-row: 2;
            grid-column: 2;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .productos-panel h3 {
            margin-top: 0;
            font-size: 1em;
            text-align: center;
        }

        /* Contenedor dinámico para los botones generados */
        #contenedor-botones {
            display: flex;
            flex-direction: column;
            gap: 5px;
            overflow-y: auto;
        }

        /* Estilo para los botones de producto (negro con borde blanco) */
        .btn-producto {
            background-color: black;
            color: white;
            border: 1px solid white;
            padding: 10px;
            text-align: left;
            cursor: pointer;
            width: 100%;
        }

        .btn-producto:hover {
            background-color: #222;
        }

        /* Panel Inferior (Total y Exportar) */
        .total-panel {
            grid-row: 3;
            grid-column: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2em;
            font-weight: bold;
        }

        .export-panel {
            grid-row: 3;
            grid-column: 2;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .export-panel button {
            background-color: black;
            color: white;
            border: 1px solid white;
            padding: 10px 20px;
            cursor: pointer;
        }

    </style>
</head>
<body>

    <div class="grid-container">

        <div class="panel admin-panel">
            <input type="text" id="nombreId" placeholder="Nombre del producto" list="sugerencias">
            <datalist id="sugerencias"></datalist>
            
            <input type="number" id="precioId" placeholder="Añada un precio">
            
            <button onclick="crearBoton()">Enviar</button>
        </div>

        <div class="panel ventas-panel">
            <h2>ventas</h2>
            <div id="cuadro-ventas">
                </div>
        </div>

        <div class="panel productos-panel">
            <h3>seleccionar producto:</h3>
            <div id="contenedor-botones">
                </div>
        </div>

        <div class="panel total-panel">
            <span>total vendido:</span>
            <span id="total-display">$0.00</span>
        </div>

        <div class="panel export-panel">
            <button onclick="exportarCSV()">*boton de exportar csv*</button>
        </div>

    </div>

    <script>
        // --- LÓGICA JAVASCRIPT ---

        // Variables globales
        let totalVendido = 0;
        let listaProductos = []; // Para el filtro inteligente y persistencia básica

        // Función para CREAR UN NUEVO BOTÓN de producto
        function crearBoton() {
            // 1. Obtener valores de los inputs
            const nombre = document.getElementById('nombreId').value.trim();
            const precio = parseFloat(document.getElementById('precioId').value);

            // Validación básica
            if (!nombre || isNaN(precio) || precio <= 0) {
                alert("Por favor, ingrese un nombre y un precio válido.");
                return;
            }

            // 2. Guardar producto para el filtro inteligente (datalist)
            if (!listaProductos.some(p => p.nombre.toLowerCase() === nombre.toLowerCase())) {
                listaProductos.push({ nombre, precio });
                actualizarDatalist(nombre);
            }

            // 3. Generar el botón en el contenedor con innerHTML
            const contenedorBotones = document.getElementById('contenedor-botones');
            
            // Creamos el HTML del botón con la función de venta vinculada
            const nuevoBotonHTML = `
                <button class="btn-producto" onclick="registrarVenta('${nombre}', ${precio})">
                    ${nombre} ($${precio.toFixed(2)})
                </button>
            `;
            
            contenedorBotones.innerHTML += nuevoBotonHTML;

            // 4. Limpiar los inputs para la próxima entrada
            document.getElementById('nombreId').value = '';
            document.getElementById('precioId').value = '';
            document.getElementById('nombreId').focus(); // Pone el foco de vuelta en el nombre
        }

        // Función para REGISTRAR UNA VENTA al hacer clic en un botón
        function registrarVenta(nombreProducto, precioProducto) {
            // 1. Obtener fecha y hora actual
            const ahora = new Date();
            const fechaFormateada = ahora.toISOString().split('T')[0]; // AAAA-MM-DD
            const horaFormateada = ahora.toTimeString().split(' ')[0].substring(0, 5); // HH:MM

            // 2. Localizar el cuadro de ventas e insertar la línea con innerHTML
            const cuadroVentas = document.getElementById('cuadro-ventas');
            const lineaVenta = `<p>${fechaFormateada} ${horaFormateada} ${nombreProducto} $${precioProducto.toFixed(2)}*</p>`;
            
            cuadroVentas.innerHTML += lineaVenta;

            // 3. Actualizar el Total Vendido
            totalVendido += precioProducto;
            document.getElementById('total-display').innerText = `$${totalVendido.toFixed(2)}`;

            // Scroll automático hacia abajo en el panel de ventas
            const ventasPanel = document.querySelector('.ventas-panel');
            ventasPanel.scrollTop = ventasPanel.scrollHeight;
        }

        // Función para actualizar el datalist del "filtro inteligente"
        function actualizarDatalist(nuevoNombre) {
            const datalist = document.getElementById('sugerencias');
            datalist.innerHTML += `<option value="${nuevoNombre}">`;
        }

        // Función prototipo para Exportar CSV (solo muestra alerta)
        function exportarCSV() {
            alert("Función de exportar CSV (SaaS) - Se implementará en el Backend real. pagina web frontend desarollada por senyasser");
        }

    </script>
</body>
</html>
