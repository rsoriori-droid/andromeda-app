<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fritura Andromeda - Punto de Venta</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            grid-template-rows: auto 1fr auto;
            gap: 10px;
            flex-grow: 1;
        }

        .panel {
            border: 2px solid white;
            padding: 15px;
            box-sizing: border-box;
        }

        .admin-panel {
            grid-column: 1 / -1;
            display: flex;
            gap: 10px;
            align-items: center;
            background-color: #111;
        }

        .admin-panel input {
            background-color: #222;
            border: 1px solid white;
            color: white;
            padding: 8px;
            flex-grow: 1;
        }

        .admin-panel button {
            background-color: white;
            color: black;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
        }

        .ventas-panel {
            grid-row: 2;
            grid-column: 1;
            overflow-y: auto;
        }

        .ventas-panel h2 {
            text-align: center;
            margin-top: 0;
        }

        #cuadro-ventas {
            font-family: monospace;
            font-size: 0.9em;
        }

        .productos-panel {
            grid-row: 2;
            grid-column: 2;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .productos-panel h3 {
            margin-top: 0;
            font-size: 1em;
            text-align: center;
        }

        #contenedor-botones {
            display: flex;
            flex-direction: column;
            gap: 5px;
            overflow-y: auto;
        }

        .btn-producto {
            background-color: black;
            color: white;
            border: 1px solid white;
            padding: 10px;
            text-align: left;
            cursor: pointer;
            width: 100%;
        }

        .btn-producto:hover {
            background-color: #222;
        }

        .total-panel {
            grid-row: 3;
            grid-column: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2em;
            font-weight: bold;
        }

        .export-panel {
            grid-row: 3;
            grid-column: 2;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .export-panel button {
            background-color: black;
            color: white;
            border: 1px solid white;
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <div class="panel admin-panel">
            <input type="text" id="nombreId" placeholder="Nombre del producto" list="sugerencias">
            <datalist id="sugerencias"></datalist>
            <input type="number" id="precioId" placeholder="Precio">
            <button onclick="crearBoton()">Añadir Producto</button>
            <button onclick="limpiarTodo()" style="background-color: #440000; color: white; border: 1px solid white;">Resetear Todo</button>
        </div>

        <div class="panel ventas-panel">
            <h2>Registro de Ventas (Nube)</h2>
            <div id="cuadro-ventas"></div>
        </div>

        <div class="panel productos-panel">
            <h3>Seleccionar Producto:</h3>
            <div id="contenedor-botones"></div>
        </div>

        <div class="panel total-panel">
            <span>Total Acumulado:</span>
            <span id="total-display">$0.00</span>
        </div>

        <div class="panel export-panel">
            <button onclick="exportarSQL()">Enviar</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE CONEXIÓN
        const supabaseUrl = 'https://ekllusthrzmilknwivec.supabase.co';
        const supabaseKey = 'sb_publishable_na0BQsihDxdwjOMeVh_Clg_Fss0UTIq';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let totalVendido = 0;
        let historialVentas = [];

        // CARGA INICIAL
        window.onload = async function() {
            await cargarProductos();
            await cargarVentasHoy();
        };

        async function cargarProductos() {
            const { data, error } = await _supabase
                .from('productos')
                .select('*')
                .order('nombre', { ascending: true });

            if (error) console.error("Error cargando productos:", error);
            else {
                const contenedor = document.getElementById('contenedor-botones');
                const datalist = document.getElementById('sugerencias');
                contenedor.innerHTML = ""; 
                datalist.innerHTML = "";

                data.forEach(p => {
                    // Crear Botón
                    const btn = document.createElement('button');
                    btn.className = 'btn-producto';
                    btn.innerHTML = `${p.nombre} ($${parseFloat(p.precio).toFixed(2)})`;
                    btn.onclick = () => registrarVenta(p.nombre, p.precio);
                    contenedor.appendChild(btn);

                    // Crear Sugerencia
                    const opt = document.createElement('option');
                    opt.value = p.nombre;
                    datalist.appendChild(opt);
                });
            }
        }

        async function cargarVentasHoy() {
            const { data, error } = await _supabase
                .from('ventas')
                .select('*')
                .order('fecha_hora', { ascending: true });

            if (error) console.error("Error cargando ventas:", error);
            else {
                const cuadroVentas = document.getElementById('cuadro-ventas');
                cuadroVentas.innerHTML = "";
                totalVendido = 0;
                historialVentas = [];
                
                data.forEach(v => {
                    const fecha = new Date(v.fecha_hora).toLocaleDateString();
                    const hora = new Date(v.fecha_hora).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    const linea = `<p style="margin: 5px 0; border-bottom: 1px dotted #333;">[${fecha} ${hora}] ${v.producto} - $${parseFloat(v.precio).toFixed(2)}</p>`;
                    
                    cuadroVentas.innerHTML += linea;
                    historialVentas.push(v);
                    totalVendido += parseFloat(v.precio);
                });
                document.getElementById('total-display').innerText = `$${totalVendido.toFixed(2)}`;
                cuadroVentas.scrollTop = cuadroVentas.scrollHeight;
            }
        }

        // ACCIONES
        async function crearBoton() {
            const nombre = document.getElementById('nombreId').value.trim();
            const precio = parseFloat(document.getElementById('precioId').value);

            if (!nombre || isNaN(precio) || precio <= 0) {
                alert("Ingresa datos válidos.");
                return;
            }

            const { error } = await _supabase
                .from('productos')
                .insert([{ nombre, precio }]);
            
            if (error) {
                if(error.code === '23505') alert("Este producto ya existe.");
                else console.error(error);
            } else {
                document.getElementById('nombreId').value = "";
                document.getElementById('precioId').value = "";
                await cargarProductos();
            }
        }

        async function registrarVenta(nombre, precio) {
            const { error } = await _supabase
                .from('ventas')
                .insert([{ producto: nombre, precio: precio }]);

            if (error) alert("Error de conexión con la nube.");
            else await cargarVentasHoy();
        }

        async function limpiarTodo() {
            if(confirm("¿Borrar permanentemente todos los registros de la nube?")) {
                await _supabase.from('ventas').delete().neq('id', 0);
                await _supabase.from('productos').delete().neq('id', 0);
                location.reload();
            }
        }

        function exportarSQL() {
            let reporteDiv = document.getElementById('reporte-sql');
            if (!reporteDiv) {
                reporteDiv = document.createElement('div');
                reporteDiv.id = 'reporte-sql';
                reporteDiv.className = 'panel';
                reporteDiv.style.marginTop = '20px';
                reporteDiv.style.borderColor = 'yellow';
                document.body.appendChild(reporteDiv);
            }

            reporteDiv.innerHTML = `
                <h3 style="color: yellow; margin-top: 0;">>_ AUDITORÍA POSTGRESQL CLOUD</h3>
                <p>Total de ventas registradas: <strong>${historialVentas.length}</strong></p>
                <p>Suma total : <strong style="color: #00ff00;">$${totalVendido.toFixed(2)}</strong></p>
                <p style="font-size: 0.8em; color: gray;">Sincronizado con proyecto: ekllusthrzmilknwivec</p>
            `;
            reporteDiv.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
