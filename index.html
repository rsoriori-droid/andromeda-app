<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fritura Andromeda - Punto de Venta</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            grid-template-rows: auto 1fr auto;
            gap: 10px;
            flex-grow: 1;
        }

        .panel {
            border: 2px solid white;
            padding: 15px;
            box-sizing: border-box;
        }

        .admin-panel {
            grid-column: 1 / -1;
            display: flex;
            gap: 10px;
            align-items: center;
            background-color: #111;
        }

        .admin-panel input {
            background-color: #222;
            border: 1px solid white;
            color: white;
            padding: 8px;
            flex-grow: 1;
        }

        .admin-panel button {
            background-color: white;
            color: black;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
        }

        .ventas-panel {
            grid-row: 2;
            grid-column: 1;
            overflow-y: auto;
        }

        .ventas-panel h2 {
            text-align: center;
            margin-top: 0;
        }

        #cuadro-ventas {
            font-family: monospace;
            font-size: 0.9em;
        }

        .productos-panel {
            grid-row: 2;
            grid-column: 2;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .productos-panel h3 {
            margin-top: 0;
            font-size: 1em;
            text-align: center;
        }

        #contenedor-botones {
            display: flex;
            flex-direction: column;
            gap: 5px;
            overflow-y: auto;
        }

        .btn-producto {
            background-color: black;
            color: white;
            border: 1px solid white;
            padding: 10px;
            text-align: left;
            cursor: pointer;
            width: 100%;
        }

        .btn-producto:hover {
            background-color: #222;
        }

        .total-panel {
            grid-row: 3;
            grid-column: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2em;
            font-weight: bold;
        }

        .export-panel {
            grid-row: 3;
            grid-column: 2;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .export-panel button {
            background-color: black;
            color: white;
            border: 1px solid white;
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <div class="panel admin-panel">
            <input type="text" id="nombreId" placeholder="Nombre del producto" list="sugerencias">
            <datalist id="sugerencias"></datalist>
            <input type="number" id="precioId" placeholder="Añada un precio">
            <button onclick="crearBoton()">Enviar</button>
            <button onclick="limpiarTodo()" style="background-color: #440000; color: white; border: 1px solid white;">Borrar Todo</button>
        </div>

        <div class="panel ventas-panel">
            <h2>ventas</h2>
            <div id="cuadro-ventas"></div>
        </div>

        <div class="panel productos-panel">
            <h3>seleccionar producto:</h3>
            <div id="contenedor-botones"></div>
        </div>

        <div class="panel total-panel">
            <span>total vendido:</span>
            <span id="total-display">$0.00</span>
        </div>

        <div class="panel export-panel">
            <button onclick="exportarCSV()">GENERAR REPORTE SQL</button>
        </div>
    </div>

    <script>
        // --- LÓGICA DEL SISTEMA ---
        let totalVendido = 0;
        let listaProductos = [];
        let historialVentas = [];

        // AL CARGAR: Recuperar datos
        window.onload = function() {
            const datosGuardados = localStorage.getItem('andromeda_datos');
            if (datosGuardados) {
                const appData = JSON.parse(datosGuardados);
                listaProductos = appData.listaProductos || [];
                historialVentas = appData.historialVentas || [];
                totalVendido = appData.totalVendido || 0;

                listaProductos.forEach(p => {
                    agregarBotonVisual(p.nombre, p.precio);
                    actualizarDatalist(p.nombre);
                });
                
                const cuadroVentas = document.getElementById('cuadro-ventas');
                historialVentas.forEach(venta => {
                    cuadroVentas.innerHTML += venta;
                });

                document.getElementById('total-display').innerText = `$${totalVendido.toFixed(2)}`;
            }
        };

        function guardarEnLocalStorage() {
            const appData = {
                listaProductos: listaProductos,
                historialVentas: historialVentas,
                totalVendido: totalVendido
            };
            localStorage.setItem('andromeda_datos', JSON.stringify(appData));
        }

        function crearBoton() {
            const nombre = document.getElementById('nombreId').value.trim();
            const precio = parseFloat(document.getElementById('precioId').value);

            if (!nombre || isNaN(precio) || precio <= 0) {
                alert("Por favor, ingrese un nombre y un precio válido.");
                return;
            }

            if (!listaProductos.some(p => p.nombre.toLowerCase() === nombre.toLowerCase())) {
                listaProductos.push({ nombre, precio });
                actualizarDatalist(nombre);
                agregarBotonVisual(nombre, precio);
                guardarEnLocalStorage();
            }

            document.getElementById('nombreId').value = '';
            document.getElementById('precioId').value = '';
            document.getElementById('nombreId').focus();
        }

        function agregarBotonVisual(nombre, precio) {
            const contenedorBotones = document.getElementById('contenedor-botones');
            const nuevoBotonHTML = `
                <button class="btn-producto" onclick="registrarVenta('${nombre}', ${precio})">
                    ${nombre} ($${precio.toFixed(2)})
                </button>
            `;
            contenedorBotones.innerHTML += nuevoBotonHTML;
        }

        function registrarVenta(nombreProducto, precioProducto) {
            const ahora = new Date();
            const fechaFormateada = ahora.toISOString().split('T')[0];
            const horaFormateada = ahora.toTimeString().split(' ')[0].substring(0, 5);

            const cuadroVentas = document.getElementById('cuadro-ventas');
            const lineaVenta = `<p>${fechaFormateada} ${horaFormateada} ${nombreProducto} $${precioProducto.toFixed(2)}*</p>`;
            
            cuadroVentas.innerHTML += lineaVenta;
            historialVentas.push(lineaVenta);

            totalVendido += precioProducto;
            document.getElementById('total-display').innerText = `$${totalVendido.toFixed(2)}`;
            
            guardarEnLocalStorage();

            const ventasPanel = document.querySelector('.ventas-panel');
            ventasPanel.scrollTop = ventasPanel.scrollHeight;
        }

        function actualizarDatalist(nuevoNombre) {
            const datalist = document.getElementById('sugerencias');
            datalist.innerHTML += `<option value="${nuevoNombre}">`;
        }

        function limpiarTodo() {
            if(confirm("¿Estás seguro de que quieres borrar todos los datos?")) {
                localStorage.removeItem('andromeda_datos');
                location.reload();
            }
        }

        // --- TU NUEVA FUNCIÓN DE REPORTE SQL ---
        function exportarCSV() {
            const diasSemana = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
            const hoy = new Date();
            const nombreDia = diasSemana[hoy.getDay()];

            let reporteDiv = document.getElementById('reporte-sql');
            if (!reporteDiv) {
                reporteDiv = document.createElement('div');
                reporteDiv.id = 'reporte-sql';
                reporteDiv.className = 'panel';
                reporteDiv.style.marginTop = '20px';
                reporteDiv.style.borderColor = 'yellow';
                document.body.appendChild(reporteDiv);
            }

            reporteDiv.innerHTML = `
                <h3 style="color: yellow; margin-top: 0;">>_ EJECUTANDO QUERY: SELECT SUM(precio) FROM ventas...</h3>
                <table style="width: 100%; border-collapse: collapse; font-family: monospace;">
                    <thead>
                        <tr style="border-bottom: 1px solid white; text-align: left;">
                            <th>CONCEPTO</th>
                            <th>VALOR (AS total_hoy)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Total Ventas ${nombreDia}</td>
                            <td style="color: #00ff00;">$${totalVendido.toFixed(2)}</td>
                        </tr>
                        <tr>
                            <td>Registros Procesados</td>
                            <td>${historialVentas.length} ítems</td>
                        </tr>
                    </tbody>
                </table>
                <p style="font-size: 0.8em; color: gray; margin-top: 10px;">
                    Estado: Datos listos para migración a PostgreSQL | Desarrollado por senyasser
                </p>
            `;

            reporteDiv.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
